services:
  - type: web
    name: backero-backend
    env: node
    region: singapore
    plan: starter
    buildCommand: npm install --production
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        value: https://resplendent-shortbread-91ee46.netlify.app
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: WA_SESSION_PATH
        value: /mnt/wa_session
      # Set these in the Render dashboard (Environment tab) — never commit secrets:
      # MONGODB_URI
      # JWT_SECRET
      # JWT_REFRESH_SECRET
    disk:
      name: wa-session-store
      mountPath: /mnt/wa_session
      sizeGB: 1
